<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3d2e" />
  <title>Лягушка-паркур</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background: #0d1f16;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    #wrap {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      width: 100%;
      max-width: 520px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.45);
    }
    #hint {
      color: #7cb89a;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      padding: 0 16px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c" width="390" height="700"></canvas>
    <p id="hint">5 жизней · смерть — с начала текущего уровня · Тап — прыжок / двойной · Флажок — следующий этап</p>
  </div>
  <script>
(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const LW = 390;
  const LH = 700;
  const GROUND_Y = LH * 0.78;

  const G = 2100;
  const JUMP = -720;
  const DJUMP = -620;
  const MAX_JUMPS = 2;

  const SPIKE_H = 26;
  const MAX_WALL_LOW = 80;
  const MAX_WALL_HIGH = 108;
  const LIVES_MAX = 5;

  let dispW = LW;
  let dispH = LH;

  function fitCanvas() {
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const maxW = Math.min(window.innerWidth - 8, 520);
    const aspect = LW / LH;
    const w = Math.floor(maxW * dpr);
    const h = Math.floor((maxW / aspect) * dpr);
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = maxW + 'px';
    canvas.style.height = (maxW / aspect) + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    dispW = maxW;
    dispH = maxW / aspect;
    return { W: dispW, H: dispH };
  }

  let cameraX = 0;
  let worldEnd = 0;
  let score = 0;
  let best = Number(localStorage.getItem('frogParkourBest') || 0);
  let bestLevelDisplay = Number(localStorage.getItem('frogParkourBestLevel') || 0);
  let playing = false;
  let gameOver = false;

  let currentLevel = 0;
  let levelStartX = 0;
  let levelBannerT = 0;
  let levelBannerCompletedName = 1;
  let lives = LIVES_MAX;

  const frog = {
    x: 0, y: 0, vy: 0, w: 38, h: 36,
    jumps: 0,
    grounded: false,
    squash: 1,
    blink: 0,
  };

  const platforms = [];
  const walls = [];
  const waters = [];
  const spikes = [];
  const birds = [];
  const beetles = [];
  const flags = [];

  function rnd(a, b) { return a + Math.random() * (b - a); }
  function rndi(a, b) { return Math.floor(rnd(a, b + 1)); }

  function levelGoalDistance(lv) {
    return 1550 + lv * 380;
  }

  function runSpeedForLevel(lv) {
    const v = 152 + lv * 26 + Math.min(lv, 10) * 12;
    return Math.min(395, v);
  }

  function getRunSpeed() {
    return runSpeedForLevel(currentLevel);
  }

  function spawnProfile(lv) {
    if (lv <= 0) {
      return {
        segMin: 320,
        segMax: 520,
        pLowWall: 0.09,
        pHighWall: 0,
        pLake: 0.05,
        pSpike: 0,
        pBeetle: 0,
        pBird: 0,
        lakeGapMax: 145,
        lakeIslandsMin: 1,
        wallLowH: [36, Math.min(68, MAX_WALL_LOW)],
        wallHighH: [55, Math.min(72, MAX_WALL_HIGH)],
      };
    }
    if (lv === 1) {
      return {
        segMin: 260,
        segMax: 420,
        pLowWall: 0.2,
        pHighWall: 0.08,
        pLake: 0.14,
        pSpike: 0.06,
        pBeetle: 0,
        pBird: 0,
        lakeGapMax: 200,
        lakeIslandsMin: 1,
        wallLowH: [52, Math.min(88, MAX_WALL_LOW)],
        wallHighH: [78, Math.min(102, MAX_WALL_HIGH)],
      };
    }
    const t = Math.min(8, lv - 2);
    return {
      segMin: Math.max(160, 240 - t * 14),
      segMax: Math.max(220, 360 - t * 16),
      pLowWall: 0.22 + t * 0.03,
      pHighWall: 0.12 + t * 0.04,
      pLake: 0.18 + t * 0.05,
      pSpike: 0.08 + t * 0.04,
      pBeetle: 0.04 + t * 0.05,
      pBird: 0.07 + t * 0.06,
      lakeGapMax: 220 + t * 35,
      lakeIslandsMin: t >= 4 ? 0 : 1,
      wallLowH: [58, Math.min(92, MAX_WALL_LOW)],
      wallHighH: [85, Math.min(MAX_WALL_HIGH, 102 + t * 2)],
    };
  }

  function clearWorld() {
    platforms.length = 0;
    walls.length = 0;
    waters.length = 0;
    spikes.length = 0;
    birds.length = 0;
    beetles.length = 0;
    flags.length = 0;
    worldEnd = 0;
  }

  function addGround(x0, x1) {
    platforms.push({ x: x0, y: GROUND_Y, w: x1 - x0, h: 40, kind: 'ground' });
  }

  function addIsland(wx, topY, ww) {
    const ph = 22;
    platforms.push({ x: wx, y: topY, w: ww, h: ph, kind: 'island' });
  }

  function addWall(wx, width, heightPx, capHigh) {
    const cap = capHigh ? MAX_WALL_HIGH : MAX_WALL_LOW;
    const h = Math.max(34, Math.min(heightPx, cap));
    const top = GROUND_Y - h;
    walls.push({ x: wx, y: top, w: width, h });
  }

  function addWater(x0, x1) {
    waters.push({ x: x0, x1 });
  }

  function addSpike(sx, sw) {
    spikes.push({ x: sx, w: sw });
  }

  function addBird(anchorX, yFrac) {
    birds.push({
      x: anchorX,
      y: yFrac * LH,
      vx: rnd(-155, -105) - currentLevel * 8,
      w: 30,
      h: 22,
      wing: rnd(0, 6),
    });
  }

  function addBeetle(x0, x1) {
    const w = rnd(24, 34);
    const x = rnd(x0 + 40, Math.max(x0 + 40, x1 - w - 40));
    beetles.push({
      x,
      y: GROUND_Y - 14,
      w,
      h: 16,
      vx: rnd(0, 1) < 0.5 ? -45 - currentLevel * 6 : 45 + currentLevel * 6,
      leg: 0,
    });
  }

  function placeLevelFlag() {
    const gx = levelStartX + levelGoalDistance(currentLevel);
    if (flags.length && flags[flags.length - 1].x >= gx - 20) return;
    flags.push({ x: gx, label: currentLevel + 1 });
  }

  function normalizedSpawn(P) {
    let pl = P.pLake;
    let ph = P.pHighWall;
    let pw = P.pLowWall;
    const maxObstacle = 0.9;
    let s = pl + ph + pw;
    if (s > maxObstacle) {
      const k = maxObstacle / s;
      pl *= k;
      ph *= k;
      pw *= k;
      s = maxObstacle;
    }
    return { pl, ph, pw, pEmpty: 1 - s };
  }

  function extendWorld() {
    const P = spawnProfile(currentLevel);
    const Q = normalizedSpawn(P);
    const horizon = cameraX + LW * 2.6;
    while (worldEnd < horizon) {
      const r = Math.random();
      const seg = rnd(P.segMin, P.segMax);
      const segStart = worldEnd;

      if (r < Q.pl) {
        addGround(worldEnd, worldEnd + seg);
        let islands = rndi(P.lakeIslandsMin, 2);
        let gap = islands === 0 ? rnd(130, Math.min(210, P.lakeGapMax)) : rnd(160, P.lakeGapMax);
        if (currentLevel === 0) {
          islands = rndi(1, 2);
          gap = rnd(120, 165);
        }
        const lakeStart = worldEnd + seg;
        const lakeEnd = lakeStart + gap;
        addWater(lakeStart, lakeEnd);
        const islandW = rnd(52, 78);
        if (islands === 1) {
          const ix = lakeStart + gap / 2 - islandW / 2;
          addIsland(ix, rnd(LH * 0.58, LH * 0.68), islandW);
        } else if (islands === 2) {
          const ix1 = lakeStart + gap * 0.26 - islandW / 2;
          const ix2 = lakeStart + gap * 0.74 - islandW / 2;
          addIsland(ix1, rnd(LH * 0.56, LH * 0.66), islandW * rnd(0.88, 1));
          addIsland(ix2, rnd(LH * 0.58, LH * 0.7), islandW * rnd(0.88, 1));
        }
        worldEnd = lakeEnd;
        const after = rnd(110, 220);
        addGround(worldEnd, worldEnd + after);
        worldEnd += after;
      } else if (r < Q.pl + Q.ph) {
        addGround(worldEnd, worldEnd + seg);
        const wh = rnd(P.wallHighH[0], P.wallHighH[1]);
        const ww = rnd(26, 42);
        const wx = worldEnd + rnd(55, Math.max(55, seg - ww - 55));
        addWall(wx, ww, wh, true);
        worldEnd += seg;
      } else if (r < Q.pl + Q.ph + Q.pw) {
        addGround(worldEnd, worldEnd + seg);
        const wh = rnd(P.wallLowH[0], P.wallLowH[1]);
        const ww = rnd(22, 38);
        const wx = worldEnd + rnd(45, Math.max(45, seg - ww - 45));
        addWall(wx, ww, wh, false);
        if (P.pSpike > 0 && Math.random() < P.pSpike && seg > 200) {
          const sw = rnd(36, 56);
          const sx = worldEnd + rnd(70, Math.max(70, seg - sw - 80));
          if (Math.abs(sx - wx) > 55) addSpike(sx, sw);
        }
        if (P.pBeetle > 0 && Math.random() < P.pBeetle && seg > 240) {
          addBeetle(worldEnd, worldEnd + seg);
        }
        if (P.pBird > 0 && Math.random() < P.pBird && seg > 220) {
          addBird(segStart + rnd(100, seg - 60), rnd(0.32, 0.5));
        }
        worldEnd += seg;
      } else {
        addGround(worldEnd, worldEnd + seg);
        if (P.pSpike > 0 && Math.random() < P.pSpike * 1.2 && seg > 200) {
          const sw = rnd(32, 52);
          const sx = worldEnd + rnd(60, Math.max(60, seg - sw - 60));
          addSpike(sx, sw);
        }
        if (P.pBeetle > 0 && Math.random() < P.pBeetle * 1.1 && seg > 260) {
          addBeetle(worldEnd, worldEnd + seg);
        }
        if (P.pBird > 0 && Math.random() < P.pBird * 1.1 && seg > 240) {
          addBird(segStart + rnd(90, seg - 50), rnd(0.3, 0.52));
        }
        worldEnd += seg;
      }
    }
    placeLevelFlag();
  }

  function reset() {
    clearWorld();
    cameraX = 0;
    frog.x = 95;
    frog.y = GROUND_Y - frog.h;
    frog.vy = 0;
    frog.jumps = 0;
    frog.grounded = true;
    frog.squash = 1;
    score = 0;
    gameOver = false;
    playing = true;
    lives = LIVES_MAX;
    currentLevel = 0;
    levelStartX = frog.x;
    levelBannerT = 0;
    worldEnd = 0;
    addGround(0, 480);
    worldEnd = 480;
    extendWorld();
  }

  function jump() {
    if (gameOver || !playing) {
      reset();
      return;
    }
    if (frog.jumps >= MAX_JUMPS) return;
    frog.jumps++;
    frog.vy = frog.jumps === 1 ? JUMP : DJUMP;
    frog.grounded = false;
    frog.squash = 0.88;
  }

  function feetY() {
    return frog.y + frog.h;
  }

  function overlapsX(ax, aw, bx, bw) {
    return ax < bx + bw && ax + aw > bx;
  }

  function frogHitboxInflate(ix, iy, iw, ih, pad) {
    return {
      x: ix + pad,
      y: iy + pad,
      w: iw - pad * 2,
      h: ih - pad * 2,
    };
  }

  function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function resolveGround(dt) {
    frog.grounded = false;
    let bestTop = null;
    let bestPlat = null;

    for (const p of platforms) {
      if (!overlapsX(frog.x, frog.w, p.x, p.w)) continue;
      const top = p.y;
      const feet = feetY();
      if (frog.vy >= 0 && feet >= top - 4 && feet <= top + 16) {
        if (bestTop === null || top < bestTop) {
          bestTop = top;
          bestPlat = p;
        }
      }
    }

    for (const w of walls) {
      if (!overlapsX(frog.x, frog.w, w.x, w.w)) continue;
      const top = w.y;
      const feet = feetY();
      if (frog.vy >= 0 && feet >= top - 5 && feet <= top + 18) {
        if (bestTop === null || top < bestTop) {
          bestTop = top;
          bestPlat = w;
        }
      }
    }

    if (bestPlat) {
      frog.y = bestTop - frog.h;
      frog.vy = 0;
      frog.grounded = true;
      frog.jumps = 0;
      frog.squash = Math.min(1, frog.squash + dt * 6);
    }
  }

  function wallCollisionDeath() {
    const lip = 10;
    for (const w of walls) {
      const left = w.x;
      const right = w.x + w.w;
      const top = w.y;
      const wallH = GROUND_Y - top;
      if (!overlapsX(frog.x, frog.w, left, right - left)) continue;

      if (feetY() <= top + lip) continue;

      if (aabb(frog.x, frog.y, frog.w, frog.h, left, top, w.w, wallH)) return true;
    }
    return false;
  }

  function spikeCollision() {
    const spikeTop = GROUND_Y - SPIKE_H;
    const hb = frogHitboxInflate(frog.x, frog.y, frog.w, frog.h, 5);
    for (const s of spikes) {
      if (!overlapsX(hb.x, hb.w, s.x, s.w)) continue;
      if (hb.y + hb.h > spikeTop + 3 && hb.y < GROUND_Y + 6) return true;
    }
    return false;
  }

  function birdCollision() {
    const hb = frogHitboxInflate(frog.x, frog.y, frog.w, frog.h, 4);
    for (const b of birds) {
      if (aabb(hb.x, hb.y, hb.w, hb.h, b.x - b.w * 0.5, b.y - b.h * 0.5, b.w, b.h)) return true;
    }
    return false;
  }

  function beetleCollision() {
    const hb = frogHitboxInflate(frog.x, frog.y, frog.w, frog.h, 4);
    for (const z of beetles) {
      if (aabb(hb.x, hb.y, hb.w, hb.h, z.x, z.y - z.h, z.w, z.h)) return true;
    }
    return false;
  }

  function inWater() {
    const fx = frog.x + frog.w * 0.5;
    const fy = feetY();
    if (fy < GROUND_Y - 4) return false;
    for (const w of waters) {
      if (fx >= w.x && fx <= w.x1) return true;
    }
    return false;
  }

  function fellVoid() {
    return feetY() > GROUND_Y + 28;
  }

  function checkLevelProgress(dt) {
    const goal = levelGoalDistance(currentLevel);
    const prog = frog.x - levelStartX;
    if (prog >= goal) {
      levelBannerCompletedName = currentLevel + 1;
      currentLevel++;
      levelStartX = frog.x;
      levelBannerT = 2.1;
      const disp = currentLevel + 1;
      if (disp > bestLevelDisplay) {
        bestLevelDisplay = disp;
        localStorage.setItem('frogParkourBestLevel', String(bestLevelDisplay));
      }
      placeLevelFlag();
    }
    if (levelBannerT > 0) levelBannerT -= dt;
  }

  function respawnAtLevelStart() {
    frog.x = levelStartX;
    frog.y = GROUND_Y - frog.h;
    frog.vy = 0;
    frog.jumps = 0;
    frog.grounded = true;
    frog.squash = 1;
    cameraX = frog.x - LW * 0.28;
  }

  function loseLifeOrGameOver() {
    lives--;
    if (lives > 0) {
      respawnAtLevelStart();
      return;
    }
    gameOver = true;
    playing = false;
    if (score > best) {
      best = score;
      localStorage.setItem('frogParkourBest', String(best));
    }
    const reached = currentLevel + 1;
    bestLevelDisplay = Math.max(bestLevelDisplay, reached);
    localStorage.setItem('frogParkourBestLevel', String(bestLevelDisplay));
  }

  function update(dt) {
    if (!playing || gameOver) return;

    extendWorld();

    const run = getRunSpeed();
    frog.vy += G * dt;
    frog.y += frog.vy * dt;
    frog.x += run * dt;

    cameraX = frog.x - LW * 0.28;

    for (const b of birds) {
      b.x += b.vx * dt;
      b.wing += dt * 14;
    }
    for (const z of beetles) {
      z.x += z.vx * dt;
      z.leg += dt * 18;
    }

    resolveGround(dt);

    if (wallCollisionDeath() || spikeCollision() || birdCollision() || beetleCollision()) {
      loseLifeOrGameOver();
      return;
    }

    if (inWater() || fellVoid()) {
      loseLifeOrGameOver();
      return;
    }

    checkLevelProgress(dt);

    score = Math.max(score, Math.floor(frog.x / 10));
    frog.blink -= dt;
    if (frog.blink <= 0 && Math.random() < 0.008) frog.blink = 0.08;
    if (frog.grounded) frog.squash = Math.min(1, frog.squash + dt * 5);
    else frog.squash = Math.min(1, frog.squash + dt * 2);
  }

  function drawFrog(px, py) {
    const sc = frog.squash;
    const bw = frog.w * (2 - sc) * 0.5;
    const bh = frog.h * sc;
    const by = py + frog.h - bh;

    ctx.fillStyle = '#3d9e5c';
    ctx.beginPath();
    ctx.ellipse(px + frog.w * 0.5, by + bh * 0.55, bw * 1.05, bh * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#2d7a44';
    ctx.beginPath();
    ctx.ellipse(px + frog.w * 0.5, by + bh * 0.62, bw * 0.75, bh * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();

    const legY = by + bh * 0.85;
    ctx.fillStyle = '#2d7a44';
    ctx.fillRect(px + 4, legY, 8, bh * 0.2);
    ctx.fillRect(px + frog.w - 12, legY, 8, bh * 0.2);

    ctx.fillStyle = '#3d9e5c';
    ctx.beginPath();
    ctx.ellipse(px + frog.w * 0.5, by + bh * 0.35, bw * 0.9, bh * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();

    const eyeOff = frog.blink > 0 ? 2 : 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(px + frog.w * 0.38, by + bh * 0.22, 6, 5 - eyeOff, 0, 0, Math.PI * 2);
    ctx.ellipse(px + frog.w * 0.62, by + bh * 0.22, 6, 5 - eyeOff, 0, 0, Math.PI * 2);
    ctx.fill();
    if (frog.blink <= 0) {
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(px + frog.w * 0.38, by + bh * 0.22, 2.2, 0, Math.PI * 2);
      ctx.arc(px + frog.w * 0.62, by + bh * 0.22, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.strokeStyle = '#1f5c32';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px + frog.w * 0.72, by + bh * 0.38, 5, 0.2, 0.9);
    ctx.stroke();
  }

  function drawSpikes(s) {
    const top = GROUND_Y - SPIKE_H;
    const n = Math.max(3, Math.floor(s.w / 14));
    ctx.fillStyle = '#5d4e42';
    for (let i = 0; i < n; i++) {
      const px = s.x + (i + 0.5) * (s.w / n);
      ctx.beginPath();
      ctx.moveTo(px - 7, GROUND_Y);
      ctx.lineTo(px, top);
      ctx.lineTo(px + 7, GROUND_Y);
      ctx.closePath();
      ctx.fill();
    }
    ctx.strokeStyle = '#3d2f28';
    ctx.lineWidth = 1;
    for (let i = 0; i < n; i++) {
      const px = s.x + (i + 0.5) * (s.w / n);
      ctx.beginPath();
      ctx.moveTo(px - 7, GROUND_Y);
      ctx.lineTo(px, top);
      ctx.lineTo(px + 7, GROUND_Y);
      ctx.stroke();
    }
  }

  function drawBird(b) {
    const wx = Math.sin(b.wing) * 5;
    ctx.fillStyle = '#c4a574';
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, b.w * 0.45, b.h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#8b6914';
    ctx.beginPath();
    ctx.moveTo(b.x + b.w * 0.35, b.y);
    ctx.lineTo(b.x + b.w * 0.85 + wx, b.y - 6);
    ctx.lineTo(b.x + b.w * 0.5, b.y + 4);
    ctx.fill();
    ctx.fillStyle = '#3a2f2a';
    ctx.beginPath();
    ctx.arc(b.x - b.w * 0.25, b.y - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#5c4033';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x - 4, b.y + 2);
    ctx.quadraticCurveTo(b.x - b.w * 0.7 - wx, b.y + 10, b.x - b.w * 0.9, b.y + 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(b.x - 2, b.y + 4);
    ctx.quadraticCurveTo(b.x - b.w * 0.65 + wx * 0.5, b.y + 12, b.x - b.w * 0.85, b.y + 8);
    ctx.stroke();
  }

  function drawBeetle(z) {
    const bob = Math.sin(z.leg) * 2;
    ctx.fillStyle = '#6d4c41';
    ctx.beginPath();
    ctx.ellipse(z.x + z.w * 0.5, z.y - z.h * 0.5 + bob, z.w * 0.55, z.h * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(z.x + z.w * 0.2, z.y - z.h - 2 + bob, z.w * 0.6, 6);
    ctx.strokeStyle = '#3e2723';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      const lx = z.x + 6 + i * (z.w / 4);
      const off = (i % 2 === 0 ? 1 : -1) * Math.sin(z.leg * 1.5) * 4;
      ctx.beginPath();
      ctx.moveTo(lx, z.y - 2 + bob);
      ctx.lineTo(lx + off, z.y + 8 + bob);
      ctx.stroke();
    }
  }

  function drawFlag(f) {
    const px = f.x;
    const poleTop = GROUND_Y - 120;
    ctx.fillStyle = '#6d4d3d';
    ctx.fillRect(px - 3, poleTop, 6, GROUND_Y - poleTop);
    ctx.fillStyle = '#e53935';
    ctx.beginPath();
    ctx.moveTo(px + 3, poleTop + 4);
    ctx.lineTo(px + 52, poleTop + 22);
    ctx.lineTo(px + 3, poleTop + 40);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#b71c1c';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '700 11px system-ui';
    ctx.fillText(String(f.label != null ? f.label : 1), px + 14, poleTop + 28);
  }

  function draw() {
    const sx = dispW / LW;
    const sy = dispH / LH;

    ctx.save();
    ctx.scale(sx, sy);

    const sky0 = '#87ceeb';
    const sky1 = '#b8e0f0';
    const grad = ctx.createLinearGradient(0, 0, 0, LH);
    grad.addColorStop(0, sky0);
    grad.addColorStop(1, sky1);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, LW, LH);

    ctx.fillStyle = '#3d6b4a';
    ctx.fillRect(0, GROUND_Y, LW, LH - GROUND_Y);
    ctx.fillStyle = '#2d5238';
    ctx.fillRect(0, GROUND_Y, LW, 8);

    ctx.save();
    ctx.translate(-cameraX, 0);

    for (const p of platforms) {
      if (p.x + p.w < cameraX - 50 || p.x > cameraX + LW + 220) continue;
      if (p.kind === 'island') {
        ctx.fillStyle = '#6b5344';
        ctx.beginPath();
        ctx.ellipse(p.x + p.w * 0.5, p.y + p.h * 0.55, p.w * 0.55, p.h * 1.15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#8b7355';
        ctx.fillRect(p.x + p.w * 0.15, p.y, p.w * 0.7, p.h * 0.65);
        ctx.fillStyle = '#4a7c59';
        ctx.fillRect(p.x, p.y, p.w, p.h * 0.4);
      } else {
        ctx.fillStyle = '#3d6b4a';
        ctx.fillRect(p.x, p.y, p.w, LH - p.y + 30);
        ctx.fillStyle = '#356040';
        ctx.fillRect(p.x, p.y, p.w, 6);
      }
    }

    for (const w of waters) {
      if (w.x1 < cameraX - 50 || w.x > cameraX + LW + 220) continue;
      const y0 = GROUND_Y;
      ctx.fillStyle = 'rgba(40, 100, 180, 0.55)';
      ctx.fillRect(w.x, y0, w.x1 - w.x, LH - y0);
      ctx.strokeStyle = 'rgba(120, 200, 255, 0.35)';
      ctx.lineWidth = 2;
      for (let t = 0; t < w.x1 - w.x; t += 28) {
        ctx.beginPath();
        ctx.moveTo(w.x + t, y0 + 12);
        ctx.quadraticCurveTo(w.x + t + 14, y0 + 4, w.x + t + 28, y0 + 12);
        ctx.stroke();
      }
    }

    for (const s of spikes) {
      if (s.x + s.w < cameraX - 40 || s.x > cameraX + LW + 200) continue;
      drawSpikes(s);
    }

    for (const w of walls) {
      if (w.x + w.w < cameraX - 50 || w.x > cameraX + LW + 220) continue;
      const ph = GROUND_Y - w.y;
      ctx.fillStyle = '#6b5b4f';
      ctx.fillRect(w.x, w.y, w.w, ph);
      ctx.fillStyle = '#5a4a3e';
      for (let i = 4; i < ph; i += 14) {
        ctx.fillRect(w.x + 3, w.y + i, w.w - 6, 6);
      }
      ctx.strokeStyle = '#4a3d33';
      ctx.lineWidth = 2;
      ctx.strokeRect(w.x, w.y, w.w, ph);
    }

    for (const z of beetles) {
      if (z.x + z.w < cameraX - 40 || z.x > cameraX + LW + 200) continue;
      drawBeetle(z);
    }

    for (const b of birds) {
      if (b.x + b.w < cameraX - 80 || b.x - b.w > cameraX + LW + 240) continue;
      drawBird(b);
    }

    for (const f of flags) {
      if (f.x < cameraX - 30 || f.x > cameraX + LW + 120) continue;
      drawFlag(f);
    }

    if (frog.x + frog.w > cameraX - 90 && frog.x < cameraX + LW + 90) {
      drawFrog(frog.x, frog.y);
    }

    ctx.restore();

    const goal = levelGoalDistance(currentLevel);
    const prog = Math.max(0, frog.x - levelStartX);
    const frac = Math.min(1, prog / goal);
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fillRect(LW - 118, 10, 106, 56);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(LW - 118, 10, 106, 56);
    ctx.fillStyle = '#e8f5e9';
    ctx.font = '700 14px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText('Уровень ' + (currentLevel + 1), LW - 18, 30);
    ctx.font = '500 11px system-ui';
    ctx.fillStyle = '#c8e6c9';
    ctx.fillText('до финиша ' + Math.floor(Math.max(0, goal - prog)), LW - 18, 46);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(LW - 108, 52, 88, 6);
    ctx.fillStyle = '#81c784';
    ctx.fillRect(LW - 108, 52, 88 * frac, 6);

    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(12, 12, 128, 76);
    ctx.fillStyle = '#e8f5e9';
    ctx.font = '600 16px system-ui';
    ctx.fillText(String(score), 22, 38);
    ctx.font = '500 12px system-ui';
    ctx.fillStyle = '#a5d6a7';
    ctx.fillText('рекорд ' + best, 22, 54);
    ctx.font = '600 13px system-ui';
    ctx.fillStyle = '#ffab91';
    ctx.fillText('♥ ' + lives, 22, 70);

    if (levelBannerT > 0 && playing && !gameOver) {
      const a = Math.min(1, levelBannerT * 1.8);
      ctx.fillStyle = 'rgba(0,0,0,' + (0.35 * a) + ')';
      ctx.fillRect(0, LH * 0.36, LW, 86);
      ctx.fillStyle = '#fff';
      ctx.font = '700 20px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('Уровень ' + levelBannerCompletedName + ' пройден!', LW / 2, LH * 0.41);
      ctx.font = '400 14px system-ui';
      ctx.fillStyle = '#c8e6c9';
      ctx.fillText('Скорость и препятствия ↑', LW / 2, LH * 0.455);
      ctx.textAlign = 'left';
    }

    if (gameOver || !playing) {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, LW, LH);
      ctx.fillStyle = '#fff';
      ctx.font = '700 22px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(gameOver ? 'Упс!' : 'Лягушка-паркур', LW / 2, LH * 0.36);
      ctx.font = '400 15px system-ui';
      ctx.fillStyle = '#c8e6c9';
      if (gameOver) {
        ctx.fillText('Очки: ' + score + ' · рекорд ' + best, LW / 2, LH * 0.42);
        if (bestLevelDisplay > 0) {
          ctx.fillText('Дальше всех: уровень ' + bestLevelDisplay, LW / 2, LH * 0.46);
        }
        ctx.fillText('Жизни закончились', LW / 2, LH * 0.485);
      }
      ctx.fillText('Тапните, чтобы ' + (gameOver ? 'играть снова' : 'старт'), LW / 2, LH * 0.56);
      ctx.textAlign = 'left';
    }

    ctx.restore();
  }

  let last = performance.now();
  function frame(now) {
    const raw = (now - last) / 1000;
    last = now;
    const dt = Math.min(0.033, Math.max(0.001, raw));
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  function onTap(e) {
    e.preventDefault();
    jump();
  }

  window.addEventListener('resize', fitCanvas);

  canvas.addEventListener('touchstart', onTap, { passive: false });
  canvas.addEventListener('mousedown', (e) => { e.preventDefault(); jump(); });

  fitCanvas();
  playing = false;
  gameOver = false;
  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
